version: '3.8'

services:
  # 1. Frontend - Interface de Votação (React)
  frontend:
    image: node:20-alpine
    container_name: bbb_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080/api/v1
    depends_on:
      - ingestion-api
      - main-api

  # 2. Vote Ingestion API (Go)
  ingestion-api:
    image: golang:1.26-alpine
    container_name: bbb_ingestion_api
    working_dir: /app
    volumes:
      - ./ingestion:/app
    command: go run cmd/api/main.go
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/bbb_development?sslmode=disable
      - RECAPTCHA_SECRET_KEY=6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe
    depends_on:
      - postgres
      - redis

  # 2.1 Vote Worker (Go)
  ingestion-worker:
    image: golang:1.26-alpine
    container_name: bbb_ingestion_worker
    working_dir: /app
    volumes:
      - ./ingestion:/app
    command: go run cmd/worker/main.go
    ports:
      - "8082:8081"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/bbb_development?sslmode=disable
    depends_on:
      - postgres
      - redis

  # 3. Main API (Ruby on Rails 8)
  main-api:
    image: ruby:3.3
    container_name: bbb_main_api
    working_dir: /app
    volumes:
      - ./backend:/app
    command: bash -c "bundle install && rm -f tmp/pids/server.pid && rails s -b 0.0.0.0"
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/bbb_development
    depends_on:
      - postgres



  # 4. Teste de Carga: K6
  k6:
    image: grafana/k6:latest
    container_name: bbb_k6
    volumes:
      - ./k6:/scripts
    command: run /scripts/load_test.js
    depends_on:
      - ingestion-api

  # 5. Banco de Dados Relacional
  postgres:
    image: postgres:16-alpine
    container_name: bbb_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bbb_development
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bbb_redis
    ports:
      - "6379:6379"

  # 6. Monitoramento: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: bbb_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - ingestion-api
      - main-api

  # 7. Monitoramento: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: bbb_grafana
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  pg_data:
