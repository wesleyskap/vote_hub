apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: ingestion-worker
  template:
    metadata:
      labels:
        app: ingestion-worker
    spec:
      containers:
      - name: ingestion-worker
        image: bbb-ingestion:v7
        imagePullPolicy: IfNotPresent
        command: ["/app/worker"]
        ports:
        - containerPort: 8081
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/bbb_development?sslmode=disable"
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

