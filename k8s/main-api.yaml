apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-api
  template:
    metadata:
      labels:
        app: main-api
    spec:
      containers:
      - name: main-api
        image: bbb-main-api:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_DB
          value: "bbb_development"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/bbb_development?sslmode=disable"
        - name: SECRET_KEY_BASE
          value: "5f84d6ee178a9c2e0b5d8a9e7f86c2e35a90d8a7c2b5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0"
        - name: RAILS_ENV
          value: "production"
        - name: RAILS_SERVE_STATIC_FILES
          value: "true"
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: main-api
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30001
  selector:
    app: main-api
