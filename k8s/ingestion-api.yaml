apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api
spec:
  replicas: 5
  selector:
    matchLabels:
      app: ingestion-api
  template:
    metadata:
      labels:
        app: ingestion-api
    spec:
      containers:
      - name: ingestion-api
        image: bbb-ingestion:v7
        imagePullPolicy: IfNotPresent
        command: ["/app/api"]
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/bbb_development?sslmode=disable"
        - name: RECAPTCHA_SECRET_KEY
          value: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "1500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-api
spec:
  type: LoadBalancer
  ports:
  - name: default
    port: 8080
    targetPort: 8080
  - name: k6-compat
    port: 30080
    targetPort: 8080
  selector:
    app: ingestion-api
