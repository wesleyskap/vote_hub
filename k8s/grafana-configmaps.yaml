apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: default
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /etc/grafana/provisioning/dashboards
  business.json: |
    {
      "title": "Business / Paredão",
      "uid": "bbb_business_dashboard",
      "annotations": {
        "list": []
      },
      "panels": [
        {
          "type": "stat",
          "title": "Total Votes (API Ingested)",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"ingestion_api\", status_code=\"202\"})",
              "legendFormat": "Total Votes"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Valid Votes Processed (Worker)",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "max(runiq_jobs_count{queue=\"votes_queue\", status=\"processed\"})",
              "legendFormat": "Processed Votes"
            }
          ]
        }
      ],
      "schemaVersion": 39
    }
  runiq.json: |
    {
      "title": "Runiq (Worker Pool)",
      "uid": "bbb_runiq_dashboard",
      "annotations": {
        "list": []
      },
      "panels": [
        {
          "type": "stat",
          "title": "Fila Pending",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "max(runiq_jobs_count{queue=\"votes_queue\", status=\"pending\"})",
              "legendFormat": "Pending Jobs"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Active Jobs",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "max(runiq_jobs_count{queue=\"votes_queue\", status=\"running\"})",
              "legendFormat": "Active (Running)"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Dead Jobs / Failed",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "max(runiq_jobs_count{queue=\"votes_queue\", status=\"failed\"})",
              "legendFormat": "Failed Jobs"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Processed Total",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "max(runiq_jobs_count{queue=\"votes_queue\", status=\"processed\"})",
              "legendFormat": "Processed"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Worker Throughput (Jobs/sec)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "max(rate(runiq_jobs_count{queue=\"votes_queue\", status=\"processed\"}[1m]))",
              "legendFormat": "Jobs/sec"
            }
          ]
        }
      ],
      "schemaVersion": 39
    }
  sli_performance.json: |
    {
      "title": "SLI / Performance",
      "uid": "bbb_sli_performance",
      "annotations": {
        "list": []
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Request Throughput (QPS)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"ingestion_api\"}[1m])) by (method, path, status_code)",
              "legendFormat": "{{method}} {{path}} ({{status_code}})"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Latency SLI (P95) - Target < 50ms",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"ingestion_api\"}[1m])) by (le)) * 1000",
              "legendFormat": "P95 Latency (ms)"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Error Rate (500s / 429s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"ingestion_api\", status_code=~\"5..|429\"}[1m]))",
              "legendFormat": "Error Rate (req/s)"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Go Goroutines / Heap (Memory)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "go_goroutines{job=\"ingestion_api\"}",
              "legendFormat": "Goroutines"
            },
            {
              "expr": "go_memstats_heap_alloc_bytes{job=\"ingestion_api\"} / 1024 / 1024",
              "legendFormat": "Heap Alloc (MB)"
            }
          ]
        }
      ],
      "schemaVersion": 39
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: false
        jsonData:
          # Exibe os labels extraídos pelo Promtail (level, app, pod, container)
          maxLines: 1000
