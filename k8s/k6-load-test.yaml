# -------------------------------------------------
# ConfigMap com o script k6 que você edita em ./k6/
# -------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-test-script
  namespace: default
data:
  load_test_7k.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { randomIntBetween } from 'https://jslib.k6.io/k6-utils/1.2.0/index.js';

    export const options = {
      scenarios: {
        constant_rate_test: {
          executor: 'constant-arrival-rate',
          rate: 7500,
          timeUnit: '1s',
          duration: '3m',
          preAllocatedVUs: 5000,
          maxVUs: 15000,
        },
      },
      thresholds: {
        http_req_duration: ['p(99)<2000'],
      },
    };

    export default function () {
      const url = __ENV.API_URL || 'http://ingestion-api:8080/api/v1/votes';

      const randomIP = `${randomIntBetween(1, 255)}.${randomIntBetween(1, 255)}.${randomIntBetween(1, 255)}.${randomIntBetween(1, 255)}`;

      const payload = JSON.stringify({
        paredao_id: 1,
        participant_id: randomIntBetween(1, 2), // Alane ou Davi
        fingerprint_id: `k6-heavy-test-user-${__VU}-${__ITER}`,
        recaptcha_token: 'test-bypass-token',
      });

      const params = {
        headers: {
          'Content-Type': 'application/json',
          'X-Forwarded-For': randomIP,
        },
      };

      const res = http.post(url, payload, params);

      if (res.status !== 202 && res.status !== 429) {
        console.log(`Falhou! Status: ${res.status}, Body: ${res.body}`);
      }

      check(res, {
        'is status 202': (r) => r.status === 202,
        'is status 429': (r) => r.status === 429,
      });

    }
---
# -------------------------------------------------
# Job que executa o script acima
# -------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-heavy-test
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          command: ["k6", "run", "/scripts/load_test_7k.js"]
          env:
            - name: API_URL
              value: "http://ingestion-api:8080/api/v1/votes"
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "10Gi"
      restartPolicy: Never
      volumes:
        - name: script-volume
          configMap:
            name: k6-test-script      # <-- monta o ConfigMap acima
            items:
              - key: load_test_7k.js   # arquivo dentro do pod será /scripts/load_test_7k.js
                path: load_test_7k.js
  backoffLimit: 0
